name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CI: true
      TZ: Asia/Shanghai
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: file:./data/ci.sqlite
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run i18n guard checks
        run: npm run check:ci-guard

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit
